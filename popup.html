<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatAssist-AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <div class="popup-header">
      <div class="popup-brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 2l2.09 6.26L20.18 10l-6.09 3.74-2.09 6.26-2.09-6.26L3.82 10l6.09-1.74L12 2z"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-name">ChatAssist-AI</h1>
          <p class="brand-tagline">Universal AI Chat Assistant</p>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">API Key</span>
        <span id="api-status" class="status-badge status-badge--checking">Checking…</span>
      </div>
      <div class="status-row">
        <span class="status-label">Model</span>
        <span class="status-value">gpt-4o-mini</span>
      </div>
    </div>

    <!-- How to use -->
    <div class="how-to">
      <p class="how-to-title">How to use</p>
      <ol class="how-to-list">
        <li>Go to any website with chat messages</li>
        <li>Highlight / select any text</li>
        <li>Click the <strong>✦ AI button</strong> that appears</li>
        <li>Read the AI response in the popup</li>
      </ol>
    </div>

    <!-- Action -->
    <div class="popup-footer">
      <button id="open-settings-btn" class="btn-settings" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 1.41 14.14M4.93 4.93A10 10 0 0 0 3.51 19.07"/></svg>
        Open Settings
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
